name: Release package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest version
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("src/plugins/plg_tags_og/manifest.json").read_text())
          tag = os.environ.get("GITHUB_REF_NAME", "")
          expected = tag[1:] if tag.startswith("v") else manifest["version"]
          if manifest["version"] != expected:
              raise SystemExit(f"manifest.version {manifest['version']} does not match tag {tag}")
          required = {
              "schema_version", "name", "type", "vendor", "extension_id",
              "display_name", "description", "version", "license",
              "compatibility", "package"
          }
          missing = sorted(required - manifest.keys())
          if missing:
              raise SystemExit(f"manifest.json missing required keys: {', '.join(missing)}")
          if manifest["extension_id"] != f"{manifest['vendor']}/{manifest['name']}":
              raise SystemExit("extension_id must be vendor/name")
          PY

      - name: Build ZIP package
        run: |
          python - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          root = Path("src/plugins/plg_tags_og")
          manifest = json.loads((root / "manifest.json").read_text())
          package_name = f"{manifest['name']}-{manifest['version']}"
          out = Path(f"{package_name}.zip")
          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(root.rglob("*")):
                  if path.is_file():
                      zf.write(path, Path(package_name) / path.relative_to(root))
          print(out)
          PY

      - name: Generate checksum
        run: sha256sum plg_tags_og-*.zip > SHA256SUMS

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plg_tags_og-*.zip
            SHA256SUMS
